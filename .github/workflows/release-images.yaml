name: Publish container images

# Builds the distroless production image (used for the `app`, `worker` and
# `migrator` services in tools/deploy/docker/docker-compose.portainer.yml) and
# pushes it to GitHub Container Registry.
#
# Tags produced:
#   - push to main          -> :main, :sha-<short>
#   - git tag vX.Y.Z        -> :X.Y.Z, :X.Y, :latest
#   - GitHub release         -> same as the tag
#   - manual run             -> :sha-<short>

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push (distroless app image)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tools/deploy/docker/Dockerfile.distroless
          # arm64 is built under emulation and is slow; drop it if you only
          # deploy on amd64 hosts.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
